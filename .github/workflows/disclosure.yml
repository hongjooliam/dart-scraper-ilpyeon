name: DART Disclosure Scraper

on:
  workflow_dispatch: {}  # cron-job.org 가 외부에서 5분마다 트리거

# 동시에 두 번 도는 일 방지 (commit 충돌 방지)
concurrency:
  group: dart-disclosure-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # seen.json / corp_codes.json commit & push 권한
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python scraper.py

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json corp_codes.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "update state [skip ci]"
            git push
          fi
